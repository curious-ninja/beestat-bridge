# Method 1: docker-compose (any host).
# Method 2 (Home Assistant OS): add this repo as an app repository instead —
# see repository.yaml / beestat_bridge/.
services:
  bridge:
    build: .
    restart: unless-stopped
    ports:
      - "8127:8127"
    volumes:
      - ./data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      BRIDGE_CONFIG: /app/config.yaml

  # TODO(bridge): beestat app container (PHP + MySQL + sync cron) built from
  # the companion fork with ecobee_api_base_url=http://bridge:8127. Next
  # milestone.
